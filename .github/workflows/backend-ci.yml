name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.13

      - name: Sync Dependencies
        run: uv sync

      - name: Validate FastAPI App
        run: uv run python -c "from app.main import app; print('FastAPI app loaded successfully')"
